services:
  api:
    image: vvsanga/saadana-api:latest
    build: . 
    container_name: saadana-api
    restart: always
    command: npm run start:prod
    ports:
      - "3000:3000"
    env_file:
      - .env 
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - saadana-net

networks:
  saadana-net:
    driver: bridge

