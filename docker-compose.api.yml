services:
  api:
    build: .
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.api.rule=Host(`api.yourdomain.com`)"
      - "traefik.http.routers.api.entrypoints=websecure"
      - "traefik.http.routers.api.tls.certresolver=myresolver"
    networks:
      - proxy-net
      - db-net
    env_file:
      - .env.prod

networks:
  proxy-net:
    external: true
  db-net:
    driver: bridge